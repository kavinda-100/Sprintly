<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Sprintly API</title>
		<!-- styles sheet -->
		<link rel="stylesheet" href="/styles.css" />
		<!-- load js -->
		<script src="/table.js"></script>
	</head>
	<body>
		<!-- Full width container -->
		<div class="full-width-container">
			<!-- Header with API name and button -->
			<header class="api-header">
				<div class="api-title">
					<h1>Sprintly API</h1>
					<span class="version-badge">v1.0.0</span>
				</div>
				<a href="/login.html" class="btn header-btn">Get Started</a>
			</header>

			<!-- Welcome section -->
			<section class="welcome-section">
				<p class="welcome-text">
					Welcome to the Sprintly API! Your project management
					solution built with Rust and modern web technologies.
				</p>
			</section>

			<!-- Endpoints Table -->
			<section class="endpoints-section">
				<h2>Available Endpoints</h2>
				<div class="table-container">
					<table class="endpoints-table">
						<thead>
							<tr>
								<th>Endpoint</th>
								<th>Method</th>
								<th>Description</th>
								<th>Status</th>
							</tr>
						</thead>
						<tbody>
							<!-- Table rows will be dynamically generated by table.js -->
						</tbody>
					</table>
				</div>
			</section>
		</div>
	</body>
</html>
